name: PR Deploy to S3

on:
  pull_request:
    branches: ['master']
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npx vite build --config vite.preview.config.ts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync preview-build/ s3://${{ secrets.AWS_S3_BUCKET }}/pr-${{ github.event.pull_request.number }}/ --delete

      - name: Post or update PR comment with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const bucket = '${{ secrets.AWS_S3_BUCKET }}';
            const region = '${{ secrets.AWS_REGION }}';
            const baseUrl = `http://${bucket}.s3-website-${region}.amazonaws.com/pr-${prNumber}`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## 🚀 PR Preview Deployed',
              '',
              `**Commit:** \`${sha}\``,
              '',
              '| Page | URL |',
              '|------|-----|',
              `| Main | [${baseUrl}/](${baseUrl}/) |`,
              `| Calendar | [${baseUrl}/calendar.html](${baseUrl}/calendar.html) |`,
              `| Reviews | [${baseUrl}/reviews.html](${baseUrl}/reviews.html) |`,
              '',
              '_Preview will be removed automatically when the PR is closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## 🚀 PR Preview Deployed';
            const existing = comments.find(
              (c) => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
