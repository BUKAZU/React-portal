name: Bundle Size

on:
  pull_request:
    branches: ['master']

jobs:
  bundle-size:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Report bundle size
        uses: preactjs/compressed-size-action@v3
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          build-script: 'build'
          pattern: './build/portal.{es,umd,website}.js'
          strip-hash: '\.[a-f0-9]{8}\.'
